<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogTail - 日志实时查看工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #252526;
            padding: 15px 20px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3c3c3c;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-group label {
            font-size: 13px;
            color: #cccccc;
        }

        .header h1 {
            font-size: 18px;
            color: #569cd6;
            margin-right: 20px;
        }

        .server-select {
            padding: 8px 12px;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #d4d4d4;
            border-radius: 4px;
            font-size: 14px;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 10px 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3c3c3c;
            font-size: 13px;
            font-weight: bold;
            color: #cccccc;
        }

        .directory-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .tree-item {
            padding: 5px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            user-select: none;
        }

        .tree-item:hover {
            background: #2a2d2e;
        }

        .tree-item.selected {
            background: #37373d;
        }

        .tree-item.directory::before {
            content: '📁';
            font-size: 14px;
        }

        .tree-item.file::before {
            content: '📄';
            font-size: 14px;
        }

        .tree-item.expanded::before {
            content: '📂';
        }

        .tree-children {
            padding-left: 20px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            padding: 10px 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .current-file {
            flex: 1;
            font-size: 13px;
            color: #cccccc;
        }

        .current-file span {
            color: #569cd6;
        }

        .btn {
            padding: 6px 12px;
            background: #0e639c;
            border: none;
            color: white;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover {
            background: #1177bb;
        }

        .btn:disabled {
            background: #3c3c3c;
            cursor: not-allowed;
        }

        .btn-danger {
            background: #c42b1c;
        }

        .btn-danger:hover {
            background: #e03e2e;
        }

        .log-container {
            flex: 1;
            background: #1e1e1e;
            padding: 10px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
        }

        .log-line {
            white-space: pre-wrap;
            word-break: break-all;
            padding: 2px 0;
        }

        .log-line.error {
            color: #f48771;
        }

        .log-line.warn {
            color: #dcdcaa;
        }

        .log-line.info {
            color: #9cdcfe;
        }

        .status-bar {
            padding: 5px 15px;
            background: #007acc;
            color: white;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #808080;
            font-size: 14px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            fill: #808080;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 LogTail</h1>
        <select class="server-select" id="serverSelect">
            <option value="">选择服务器...</option>
        </select>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">目录浏览</div>
            <div class="directory-tree" id="directoryTree">
                <div class="empty-state">
                    <p>请先选择服务器</p>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="toolbar">
                <div class="current-file" id="currentFile">
                    未选择文件
                </div>
                <div class="toolbar-group">
                    <label for="lineCountSelect">显示行数：</label>
                    <select id="lineCountSelect" class="server-select">
                        <option value="100">100</option>
                        <option value="500">500</option>
                        <option value="1000">1000</option>
                    </select>
                </div>
                <button class="btn" id="btnStart" disabled>
                    ▶ 开始监控
                </button>
                <button class="btn btn-danger" id="btnStop" disabled>
                    ⏹ 停止监控
                </button>
                <button class="btn" id="btnClear">
                    🗑 清空显示
                </button>
                <button class="btn" id="btnDownload" disabled>
                    📥 下载文件
                </button>
            </div>
            <div class="log-container" id="logContainer">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                    </svg>
                    <p>选择一个日志文件开始查看</p>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusLeft">就绪</span>
        <span id="statusRight">行数：0</span>
    </div>

    <script>
        class LogTailViewer {
            constructor() {
                this.currentServer = '';
                this.currentFile = '';
                this.isMonitoring = false;
                this.ws = null;
                this.lineCount = 0;
                this.servers = []; // 初始化服务器列表
                
                this.initElements();
                this.bindEvents();
                this.loadServers();
            }

            async loadServers() {
                try {
                    console.log('开始加载服务器列表');
                    const response = await fetch('/api/servers');
                    console.log('服务器列表响应状态:', response.status);
                    const data = await response.json();
                    console.log('服务器列表响应数据:', data);
                    
                    if (data.success) {
                        this.servers = data.servers; // 保存服务器列表
                        this.serverSelect.innerHTML = '<option value="">选择服务器...</option>';
                        data.servers.forEach(server => {
                            const option = document.createElement('option');
                            option.value = server.host;
                            option.textContent = server.name || server.host;
                            this.serverSelect.appendChild(option);
                        });
                        console.log('服务器列表加载成功');
                    }
                } catch (error) {
                    console.error('加载服务器列表失败:', error);
                }
            }

            initElements() {
                this.serverSelect = document.getElementById('serverSelect');
                this.directoryTree = document.getElementById('directoryTree');
                this.currentFileElement = document.getElementById('currentFile');
                this.logContainer = document.getElementById('logContainer');
                this.btnStart = document.getElementById('btnStart');
                this.btnStop = document.getElementById('btnStop');
                this.btnClear = document.getElementById('btnClear');
                this.btnDownload = document.getElementById('btnDownload');
                this.lineCountSelect = document.getElementById('lineCountSelect');
                this.statusLeft = document.getElementById('statusLeft');
                this.statusRight = document.getElementById('statusRight');
            }

            bindEvents() {
                this.serverSelect.addEventListener('change', (e) => {
                    this.currentServer = e.target.value;
                    if (this.currentServer) {
                        this.loadDirectory('/data/logs');
                    }
                });

                this.btnStart.addEventListener('click', () => this.startMonitoring());
                this.btnStop.addEventListener('click', () => this.stopMonitoring());
                this.btnClear.addEventListener('click', () => this.clearLog());
                this.btnDownload.addEventListener('click', () => this.downloadFile());
            }

            async loadDirectory(path) {
                if (!this.currentServer) return;

                try {
                    // 调用后端 API 获取目录列表
                    console.log(`加载目录: ${path} 服务器: ${this.currentServer}`);
                    const response = await fetch(`/api/files/list?server=${this.currentServer}&path=${encodeURIComponent(path)}`);
                    const data = await response.json();
                    
                    console.log('目录列表响应:', data);
                    
                    if (data.success) {
                        // 对文件列表进行排序：目录在前，文件在后，文件按修改时间倒序（最新的在前）
                        const sortedItems = data.data.sort((a, b) => {
                            // 目录排在文件前面
                            if (a.type === 'directory' && b.type === 'file') return -1;
                            if (a.type === 'file' && b.type === 'directory') return 1;
                            
                            // 同类型按修改时间倒序（最新的在前）
                            if (a.type === b.type) {
                                // 这里假设后端返回的 modified 字段是可比较的时间字符串
                                return new Date(b.modified) - new Date(a.modified);
                            }
                            
                            return 0;
                        });
                        
                        this.renderDirectoryTree(sortedItems, path);
                    } else {
                        this.showError('加载目录失败：' + data.message);
                    }
                } catch (error) {
                    console.error('加载目录错误:', error);
                    this.showError('加载目录失败：' + error.message);
                }
            }

            renderDirectoryTree(items, parentPath) {
                this.directoryTree.innerHTML = '';
                const tree = this.buildTree(items, parentPath);
                this.directoryTree.appendChild(tree);
            }

            buildTree(items, parentPath) {
                const container = document.createElement('div');
                container.className = 'directory-tree';

                // 获取当前服务器的 base_path
                let basePath = '/data/logs'; // 默认值
                const serverInfo = this.servers.find(s => s.host === this.currentServer);
                if (serverInfo && serverInfo.base_path) {
                    basePath = serverInfo.base_path;
                }

                // 添加返回上一级目录的选项，但不允许超出 base_path
                if (parentPath !== '/' && parentPath !== basePath) {
                    const parentItem = document.createElement('div');
                    parentItem.className = 'tree-item directory';
                    parentItem.innerHTML = '<span>📁 ..</span>';
                    parentItem.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const parentDir = parentPath.substring(0, parentPath.lastIndexOf('/')) || '/';
                        // 确保不会超出 base_path
                        if (parentDir.startsWith(basePath)) {
                            this.loadDirectory(parentDir);
                        }
                    });
                    container.appendChild(parentItem);
                }

                items.forEach(item => {
                    const treeItem = document.createElement('div');
                    treeItem.className = `tree-item ${item.type}`;
                    treeItem.innerHTML = `<span>${item.name}</span>`;
                    
                    if (item.type === 'directory') {
                        treeItem.addEventListener('click', (e) => {
                            e.stopPropagation();
                            treeItem.classList.toggle('expanded');
                            const fullPath = `${parentPath}/${item.name}`;
                            this.loadDirectory(fullPath);
                        });
                    } else if (item.type === 'file') {
                        treeItem.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this.selectFile(parentPath, item.name);
                            
                            document.querySelectorAll('.tree-item').forEach(el => {
                                el.classList.remove('selected');
                            });
                            treeItem.classList.add('selected');
                        });
                    }

                    container.appendChild(treeItem);
                });

                return container;
            }

            selectFile(path, filename) {
                // 切换文件时，如果之前正在监控，先停止之前的监控
                if (this.isMonitoring) {
                    this.stopMonitoring();
                }

                this.currentFile = `${path}/${filename}`;
                this.currentFileElement.innerHTML = `当前文件：<span>${this.currentFile}</span>`;
                this.btnStart.disabled = false;
                this.btnDownload.disabled = false;
                this.btnStop.disabled = true;
                this.statusLeft.textContent = `已选择：${this.currentFile}`;

                // 切换文件时自动清空日志内容
                this.clearLog();
            }

            downloadFile() {
                if (!this.currentFile || !this.currentServer) return;
                
                // 构建下载 URL
                const downloadUrl = `/api/files/download?server=${this.currentServer}&file=${encodeURIComponent(this.currentFile)}`;
                
                // 创建隐藏的下载链接
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = this.currentFile.split('/').pop();
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            startMonitoring() {
                if (!this.currentFile || !this.currentServer) return;

                this.isMonitoring = true;
                this.btnStart.disabled = true;
                this.btnStop.disabled = false;
                this.btnDownload.disabled = true; // 监控时禁用下载按钮
                this.statusLeft.innerHTML = '<span class="loading"></span> 监控中...';

                // 获取选择的日志行数
                const lineCount = this.lineCountSelect.value;
                
                // 建立 WebSocket 连接
                const wsUrl = `ws://${window.location.host}/api/tail?server=${this.currentServer}&file=${encodeURIComponent(this.currentFile)}&lines=${lineCount}`;
                this.ws = new WebSocket(wsUrl);

                this.ws.onopen = () => {
                    this.statusLeft.textContent = '已连接，实时监控中...';
                };

                this.ws.onmessage = (event) => {
                    console.log('接收到 WebSocket 消息:', event.data);
                    try {
                        const data = JSON.parse(event.data);
                        console.log('解析后的消息:', data);
                        if (data.success) {
                            this.appendLog(data.content);
                        } else {
                            this.showError(data.message);
                        }
                    } catch (error) {
                        console.error('解析 WebSocket 消息失败:', error);
                        this.showError('解析消息失败: ' + error.message);
                    }
                };

                this.ws.onerror = (error) => {
                    this.showError('WebSocket 连接错误');
                    this.stopMonitoring();
                };

                this.ws.onclose = () => {
                    if (this.isMonitoring) {
                        this.stopMonitoring();
                    }
                };
            }

            stopMonitoring() {
                this.isMonitoring = false;
                this.btnStart.disabled = false;
                this.btnStop.disabled = true;
                this.btnDownload.disabled = false; // 停止监控后启用下载按钮
                this.statusLeft.textContent = '已停止监控';
                
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
            }

            appendLog(content) {
                const lines = content.split('\n');
                lines.forEach(line => {
                    if (line.trim()) {
                        const lineElement = document.createElement('div');
                        lineElement.className = 'log-line';
                        
                        if (line.toLowerCase().includes('error')) {
                            lineElement.classList.add('error');
                        } else if (line.toLowerCase().includes('warn')) {
                            lineElement.classList.add('warn');
                        } else if (line.toLowerCase().includes('info')) {
                            lineElement.classList.add('info');
                        }
                        
                        lineElement.textContent = line;
                        // 将新的日志行添加到容器底部
                        this.logContainer.appendChild(lineElement);
                        this.lineCount++;
                    }
                });

                this.statusRight.textContent = `行数：${this.lineCount}`;
                // 滚动到底部，确保最新的日志可见
                this.logContainer.scrollTop = this.logContainer.scrollHeight;
            }

            clearLog() {
                this.logContainer.innerHTML = '';
                this.lineCount = 0;
                this.statusRight.textContent = '行数：0';
            }

            showError(message) {
                this.statusLeft.textContent = `错误：${message}`;
                const errorLine = document.createElement('div');
                errorLine.className = 'log-line error';
                errorLine.textContent = `[错误] ${message}`;
                this.logContainer.appendChild(errorLine);
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            new LogTailViewer();
        });
    </script>
</body>
</html>
